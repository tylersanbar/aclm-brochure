<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Conference Brochure</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
    }

    .page {
      width: 8.5in;
      height: 11in;
      margin: auto;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1in;
      box-sizing: border-box;
      text-align: center;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 15px;
      color: #444;
    }

    .subtitle-desc {
      font-size: 14px;
      max-width: 500px;
      line-height: 1.5;
      margin-bottom: 40px;
      color: #666;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #000;
      margin: 20px 0;
    }

    .details {
      font-size: 16px;
      line-height: 1.8;
      color: #333;
    }

    @media print {
      body {
        background: white;
      }
      .page {
        margin: 0;
        width: 100%;
        height: 100%;
        page-break-after: always;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title" id="title"></div>

    <div class="subtitle" id="subtitle"></div>

    <div class="subtitle-desc" id="subtitle_desc"></div>

    <div class="divider"></div>

    <div class="details">
      <div id="conference_dates"></div>
      <div id="conference_location"></div>
    </div>
  </div>

  <script>
async function loadData() {
  const url = "YOUR_CSV_URL_HERE";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  const headers = rows[0];
  const values = rows[1];

  const data = {};

  headers.forEach((header, i) => {
    data[header.trim()] = values[i]?.trim();
  });

  // populate page
  Object.keys(data).forEach(key => {
    const el = document.getElementById(key);
    if (el) el.textContent = data[key];
  });
}

loadData();
</script>
</body>
</html>
