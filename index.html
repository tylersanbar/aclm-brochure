<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Conference Brochure</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
    }

    .page {
      width: 8.5in;
      height: 11in;
      margin: auto;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1in;
      box-sizing: border-box;
      text-align: center;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 15px;
      color: #444;
    }

    .subtitle-desc {
      font-size: 14px;
      max-width: 500px;
      line-height: 1.5;
      margin-bottom: 40px;
      color: #666;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #000;
      margin: 20px 0;
    }

    .details {
      font-size: 16px;
      line-height: 1.8;
      color: #333;
    }

    @media print {
      body {
        background: white;
      }
      .page {
        margin: 0;
        width: 100%;
        height: 100%;
        page-break-after: always;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title" id="title"></div>

    <div class="subtitle" id="subtitle"></div>

    <div class="subtitle-desc" id="subtitle_desc"></div>

    <div class="divider"></div>

    <div class="details">
      <div id="conference_dates"></div>
      <div id="conference_location"></div>
    </div>
  </div>

  <script>
    const data = {
      title: "ACLM 64th ANNUAL CONFERENCE",
      subtitle: "NAVIGATING THE NEXUS",
      subtitle_desc: "Exploring the Intersection of Law, Medicine, and Dentistry in an Era of Technological Advancements",
      conference_dates: "MARCH 1–3, 2024",
      conference_location: "Hyatt Regency Mission Bay, San Diego, CA"
    };

    Object.keys(data).forEach(key => {
      const el = document.getElementById(key);
      if (el) el.textContent = data[key];
    });
  </script>
</body>
</html>
